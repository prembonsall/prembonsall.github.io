<!DOCTYPE html>
<html>
  <head>
    <title>Pictures of Lemons</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

    <!-- Optional theme -->
    <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="css/website.css">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <script src="js/website.js"></script>
  </head>
  <body>
    <div  class="icon-bar">
        <a class="active" href="index.html" title="Home"><i class="fa fa-fw fa-lemon"></i></a>
        <a href="pitchers.html" title="Pitchers"><i class="fa fa-fw fa-fill-drip"></i></a>
        <a href="friends.html" title="Friends"><i class="fa fa-fw fa-users"></i></a>
        <a href="about.html" title="About Us"><i class="fa fa-fw fa-smile"></i></a>
    </div>
    <img class="lone" id="top" src="images/home/alone.jpg" alt = "Lone Lemon">
    <div class="container">

      <h1 class="header">Pictures of Lemons</h1>
      <div class="row">
        <div class="column">
          <div data-target="#myCarousel" data-slide-to="0"><img class="onHover" src="images/home/tree.jpg" onclick="openModal()" alt="tree" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="2"><img class="onHover" src="images/home/slices.jpg" onclick="openModal()" alt="slices" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="4"><img class="onHover" src="images/home/plate.jpg" onclick="openModal()" alt="plate" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="6"><img class="onHover" src="images/home/onecut.jpg" onclick="openModal()" alt="one cut" style="width:100%"></div>
          
        </div>
        <div class="column">
          <div data-target="#myCarousel" data-slide-to="1"><img class="onHover" src="images/home/bowl.jpg" onclick="openModal()" alt="bowl" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="3"><img class="onHover" src="images/home/box.jpg" onclick="openModal()" alt="box" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="5"><img class="onHover" src="images/home/lemonade.jpg" onclick="openModal()" alt="lemonade" style="width:100%"></div>
          <div data-target="#myCarousel" data-slide-to="7"><img class="onHover" src="images/home/falling.jpg" onclick="openModal()" alt="falling slice" style="width:100%"></div>
        </div>
      </div> 
      <div id='myModal' class="modal">
        <span class="close cursor" onclick="closeModal()">&times;</span>
        <div id="myCarousel" class="carousel slide" data-ride="carousel"class="modal-content">
          <div class="carousel-inner">

            <div class="item active">
              <div class="numbertext">1 / 8</div>
              <img src="images/home/gallery/tree.jpg" >
            </div>
            <div class="item">
              <div class="numbertext">2 / 8</div>
              <img src="images/home/gallery/bowl.jpg" >
            </div>
            <div class="item">
                <div class="numbertext">3 / 8</div>
                <img src="images/home/gallery/slices.jpg" >
              </div>
            <div class="item">
                <div class="numbertext">4 / 8</div>
                <img src="images/home/gallery/box.jpg" >
            </div>
            <div class="item">
                <div class="numbertext">5 / 8</div>
                <img src="images/home/gallery/plate.jpg" >
            </div>
            <div class="item">
                <div class="numbertext">6 / 8</div>
                <img src="images/home/gallery/lemonade.jpg" >
            </div>
            <div class="item">
                <div class="numbertext">7 / 8</div>
                <img src="images/home/gallery/onecut.jpg" >
            </div>
            <div class="item">
                <div class="numbertext">8 / 8</div>
                <img src="images/home/gallery/falling.jpg" >
           </div>
        </div>
        <a class="left carousel-control" href="#myCarousel" data-slide="prev">
            <span class="glyphicon glyphicon-chevron-left"></span>
            <span class="sr-only">Previous</span>
          </a>
          <a class="right carousel-control" href="#myCarousel" data-slide="next">
            <span class="glyphicon glyphicon-chevron-right"></span>
            <span class="sr-only">Next</span>
          </a>
        </div>
      </div>
    </div>
    <footer>
      <a href="#top"><button class="btn">Back to top</button></a>
      <p>No lemons were harmed in the creation of this site.</p>
    </footer>
  </body>
</html>
