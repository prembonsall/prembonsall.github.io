<!DOCTYPE html>
<html>
  <head>
    <title>Pictures of Lemons</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

    <!-- Optional theme -->
    <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="css/website.css">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <script src="js/website.js"></script>
  </head>
  <body>
    <div  class="icon-bar">
        <a class="active" href="index.html"><i class="fa fa-fw fa-lemon"></i></a>
        <a href="pitchers.html"><i class="fa fa-fw fa-fill-drip"></i></a>
        <a href="friends.html"><i class="fa fa-fw fa-users"></i></a>
        <a href="about.html"><i class="fa fa-fw fa-smile"></i></a>
    </div>
    <img class="lone" id="top" src="images/alone.jpg" alt = "Lone Lemon">
    <div class="container">

      <h1 class="header">Pictures of Lemons</h1>
      <div class="row">
        <div class="column">
          <img class="onHover" src="images/tree.jpg" onclick="openModal();currentSlide(1)" alt="tree" style="width:100%">
          <img class="onHover" src="images/slices.jpg" onclick="openModal();currentSlide(3)" alt="slices" style="width:100%">
          <img class="onHover" src="images/plate.jpg" onclick="openModal();currentSlide(5)" alt="plate" style="width:100%">
          <img class="onHover" src="images/onecut.jpg" onclick="openModal();currentSlide(7)" alt="one cut" style="width:100%">
          
        </div>
        <div class="column">
          <img class="onHover" src="images/bowl.jpg" onclick="openModal();currentSlide(2)" alt="bowl" style="width:100%">
          <img class="onHover" src="images/box.jpg" onclick="openModal();currentSlide(4)" alt="box" style="width:100%">
          <img class="onHover" src="images/lemonade.jpg" onclick="openModal();currentSlide(6)" alt="lemonade" style="width:100%">
          <img class="onHover" src="images/falling.jpg" onclick="openModal();currentSlide(8)" alt="falling slice" style="width:100%">
        </div>
      </div> 
      <div id='myModal' class="modal">
        <span class="close cursor" onclick="closeModal()">&times;</span>
        <div class="modal-content">

          <div class="mySlides">
            <div class="numbertext">1 / 8</div>
            <img src="images/tree.jpg" style="width:100%">
          </div>
          <div class="mySlides">
            <div class="numbertext">2 / 8</div>
            <img src="images/bowl.jpg" style="width:100%">
          </div>
          <div class="mySlides">
              <div class="numbertext">3 / 8</div>
              <img src="images/slices.jpg" style="width:100%">
            </div>
          <div class="mySlides">
              <div class="numbertext">4 / 8</div>
              <img src="images/box.jpg" style="width:100%">
          </div>
          <div class="mySlides">
              <div class="numbertext">5 / 8</div>
              <img src="images/plate.jpg" style="width:100%">
          </div>
          <div class="mySlides">
              <div class="numbertext">6 / 8</div>
              <img src="images/lemonade.jpg" style="width:100%">
          </div>
          <div class="mySlides">
              <div class="numbertext">7 / 8</div>
              <img src="images/onecut.jpg" style="width:100%">
          </div>
          <div class="mySlides">
              <div class="numbertext">8 / 8</div>
              <img src="images/falling.jpg" style="width:100%">
          </div>

          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
      </div>
    </div>
    <footer>
      <a href="#top"><button class="btn">Back to top</button></a>
      <p>No lemons were harmed in the creation of this site.</p>
    </footer>
  </body>
</html>
